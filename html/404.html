<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | CodeVogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Fixed Path to CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="cursor" aria-hidden="true"><span class="cursor-text"></span></div>

    <nav>
        <div class="logo magnetic hover-target">CODE<span>VOGUE</span></div>
        <ul class="nav-links" id="navLinks">
            <!-- Fixed Nav Links -->
            <li><a href="../index.html" class="magnetic hover-target">Home</a></li>
            <li><a href="projects.html" class="magnetic hover-target">Work</a></li>
            <li><a href="lab.html" class="magnetic hover-target">Lab</a></li>
            <li><a href="insights.html" class="magnetic hover-target">Insights</a></li>
            <li><a href="contact.html" class="magnetic hover-target">Contact</a></li>
        </ul>
        <button class="hamburger-btn hover-target" id="hamburgerBtn" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main class="container">
        <!-- Added inline padding-top so it doesn't hide behind the navbar -->
        <div class="glitch-wrapper reveal" style="padding-top: 150px;">
            <p class="hero-sub text-target" style="color: #ef4444;">FATAL EXCEPTION</p>
            <h1 class="glitch-text text-target" data-text="404">404</h1>
            <p class="hero-desc text-target" style="margin-top: 20px; font-size: 1.2rem;">SIGNAL LOST. The digital footprint you are searching for does not exist.</p>
            
            <!-- Fixed Button Link to Home -->
            <a href="../index.html" class="submit-btn hover-target magnetic" style="margin-top: 40px; display: inline-block; text-decoration: none;">REBOOT SYSTEM (HOME) ↗</a>
        </div>
    </main>

    <footer class="main-footer" style="border-top: none;">
        <div class="footer-bottom-bar reveal">
            <div class="copyright">&copy; 2026 CodeVogue. All Rights Reserved.</div>
            <div class="location">Sagar, Madhya Pradesh, IN</div>
        </div>
    </footer>

    <!-- Fixed Path to JS -->
    <script src="../js/script.js"></script>
    <script>
        // Hamburger Menu Logic
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');
        if(hamburgerBtn && navLinks) {
            hamburgerBtn.addEventListener('click', () => { hamburgerBtn.classList.toggle('active'); navLinks.classList.toggle('active'); });
            navLinks.querySelectorAll('a').forEach(link => { link.addEventListener('click', () => { hamburgerBtn.classList.remove('active'); navLinks.classList.remove('active'); }); });
        }
    </script>
</body>
</html>
