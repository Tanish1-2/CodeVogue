<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | CodeVogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="cursor" aria-hidden="true"><span class="cursor-text"></span></div>

    <nav>
        <div class="logo magnetic hover-target">CODE<span>VOGUE</span></div>
        <ul class="nav-links">
            <li><a href="../index.html" class="magnetic hover-target">Home</a></li>
            <li><a href="projects.html" class="magnetic hover-target">Work</a></li>
            <li><a href="lab.html" class="magnetic hover-target">Lab</a></li>
            <li><a href="insights.html" class="magnetic hover-target">Insights</a></li>
            <li><a href="contact.html" class="magnetic hover-target" style="color: var(--accent-glow);">Contact</a></li>
        </ul>
    </nav>

    <main class="container" style="padding-top: 220px; padding-bottom: 100px;">
        <p class="hero-sub reveal text-target">START A CONVERSATION</p>
        <h1 class="reveal text-target" style="font-size: clamp(3rem, 7vw, 7rem); margin-bottom: 3rem;">LET'S TALK</h1>
        
        <!-- Action attribute is REQUIRED for Netlify to register the form in the dashboard -->
        <form id="contactForm" name="contact" method="POST" data-netlify="true" action="/index.html" class="contact-form reveal">
            <!-- Hidden input guarantees the data gets routed correctly -->
            <input type="hidden" name="form-name" value="contact" />
            
            <div class="input-group">
                <input type="text" name="name" required placeholder="Your Name" class="hover-target">
            </div>
            <div class="input-group">
                <input type="email" name="email" required placeholder="Email Address" class="hover-target">
            </div>
            <div class="input-group">
                <textarea name="message" rows="4" required placeholder="Tell me about your project..." class="hover-target"></textarea>
            </div>
            <button type="submit" class="submit-btn hover-target magnetic">SEND MESSAGE</button>
        </form>
    </main>
    
    <footer>
        <div class="footer-bottom reveal" style="border-top: none;">
            <p class="text-target">&copy; 2026 CodeVogue.</p>
            <div style="display: flex; gap: 20px;">
                <a href="apply.html" class="hover-target" style="color: var(--text-muted); text-decoration: none;">Apply</a>
                <a href="terms.html" class="hover-target" style="color: var(--text-muted); text-decoration: none;">Terms & Policy</a>
            </div>
            <p class="text-target">Sagar, Madhya Pradesh, IN</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    
    <!-- AJAX Form Submission Script -->
    <script>
      document.querySelector("#contactForm").addEventListener("submit", function(e) {
        e.preventDefault(); 
        
        let myForm = document.getElementById("contactForm");
        let formData = new FormData(myForm);
        
        // Send data directly to the root for Netlify to process
        fetch("/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams(formData).toString(),
        })
        .then(() => {
          const btn = myForm.querySelector('button');
          btn.innerHTML = "MESSAGE SENT!";
          btn.style.color = "var(--accent-glow)";
          
          setTimeout(() => {
              window.location.href = "../index.html"; 
          }, 1000);
        })
        .catch((error) => alert("Error sending message. Please try again."));
      });
    </script>
</body>
</html>
