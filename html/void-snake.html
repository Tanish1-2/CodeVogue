<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Snake | CodeVogue Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050507; color: #f4f4f5; font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; background-image: radial-gradient(rgba(34, 197, 94, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
        
        .back-btn { position: absolute; top: 30px; left: 40px; color: #fff; text-decoration: none; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 1.2rem; transition: color 0.3s; }
        .back-btn:hover { color: #22c55e; }
        
        .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .header { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .title { font-family: 'Syne', sans-serif; font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; color: #fff; text-shadow: 0 0 20px rgba(34, 197, 94, 0.4); margin-bottom: 0; line-height: 1; }
        
        .stats-bar { display: flex; gap: 30px; align-items: center; }
        .score-board { font-size: 1.2rem; letter-spacing: 2px; color: #8a8a93; }
        #scoreValue { color: #22c55e; font-weight: 700; font-size: 1.5rem; }
        
        /* 🎛️ New Speed Selector UI */
        .difficulty-selector { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; letter-spacing: 2px; color: #8a8a93; }
        .difficulty-selector select { background: rgba(10, 10, 15, 0.8); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); border-radius: 6px; padding: 5px 10px; font-family: 'Space Grotesk', sans-serif; outline: none; cursor: pointer; letter-spacing: 1px; transition: all 0.3s; }
        .difficulty-selector select:hover { border-color: #4ade80; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        .difficulty-selector select option { background: #050507; color: #fff; }

        canvas { background: rgba(0, 0, 0, 0.8); border: 2px solid rgba(34, 197, 94, 0.3); border-radius: 12px; box-shadow: 0 0 40px rgba(34, 197, 94, 0.15); }
        
        .controls { display: flex; gap: 20px; color: #8a8a93; font-size: 0.9rem; letter-spacing: 1px; }
        .key { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; color: #fff; font-family: monospace; }
        
        #gameOverScreen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 15, 0.95); border: 1px solid #ef4444; padding: 40px 60px; border-radius: 16px; text-align: center; box-shadow: 0 0 50px rgba(239, 68, 68, 0.3); backdrop-filter: blur(10px); display: none; flex-direction: column; gap: 20px; }
        #gameOverScreen h2 { color: #ef4444; font-family: 'Syne', sans-serif; font-size: 3rem; letter-spacing: 2px; }
        .restart-btn { background: transparent; color: #fff; border: 1px solid #22c55e; padding: 15px 30px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: 2px; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; }
        .restart-btn:hover { background: #22c55e; color: #000; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
    </style>
</head>
<body>
    <a href="lab.html" class="back-btn">← BACK TO LAB</a>
    
    <div class="game-wrapper">
        <div class="header">
            <h1 class="title">VOID SNAKE</h1>
            <div class="stats-bar">
                <div class="score-board">SCORE: <span id="scoreValue">0</span></div>
                <div class="difficulty-selector">
                    <label>SPEED:</label>
                    <select id="speedSelect" onchange="resetGame()">
                        <option value="180">Easy (Slow)</option>
                        <option value="120" selected>Normal</option>
                        <option value="75">Hard (Fast)</option>
                        <option value="45">Insane</option>
                    </select>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="controls"><span>Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> or <span class="key">ARROWS</span> to navigate</span></div>
    </div>

    <div id="gameOverScreen">
        <h2>SYSTEM FAILURE</h2>
        <p>Your snake collided with the void.</p>
        <button class="restart-btn" onclick="resetGame()">REBOOT SYSTEM</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreValue");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const speedSelect = document.getElementById("speedSelect");

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;
        
        let snake = []; 
        let dx = 0; let dy = 0; 
        let foodX; let foodY; 
        let score = 0; 
        let gameLoop; 
        let gameSpeed;

        function initGame() {
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0; dy = -1; // Start moving up
            score = 0; 
            scoreElement.innerText = score;
            gameOverScreen.style.display = "none";
            
            // Set speed based on dropdown selection
            gameSpeed = parseInt(speedSelect.value);
            
            placeFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, gameSpeed);
        }

        function draw() {
            moveSnake();
            if (checkCollision()) { endGame(); return; }
            
            // Draw Background
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Food
            ctx.fillStyle = "#ef4444"; 
            ctx.shadowBlur = 20; 
            ctx.shadowColor = "#ef4444";
            ctx.beginPath(); 
            ctx.arc(foodX * gridSize + gridSize/2, foodY * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2); 
            ctx.fill(); 
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? "#4ade80" : "#22c55e";
                ctx.shadowBlur = 15; 
                ctx.shadowColor = "#22c55e";
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.shadowBlur = 0;
            });
        }

        function moveSnake() {
            // Prevent snake from reversing into itself (dy/dx blocks handle key presses, but not rapid double presses)
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            
            if (head.x === foodX && head.y === foodY) {
                score += 10; 
                scoreElement.innerText = score; 
                placeFood();
                
                // Slight speed up over time (cap it so it doesn't get impossible)
                const minSpeed = parseInt(speedSelect.value) - 30; // Max speed increase is 30ms from base
                if (gameSpeed > minSpeed) { 
                    clearInterval(gameLoop); 
                    gameSpeed -= 1; // Gentle progressive speed-up
                    gameLoop = setInterval(draw, gameSpeed); 
                }
            } else { 
                snake.pop(); 
            }
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount); 
            foodY = Math.floor(Math.random() * tileCount);
            snake.forEach(segment => { 
                if (segment.x === foodX && segment.y === foodY) placeFood(); 
            });
        }

        function checkCollision() {
            const head = snake[0];
            // Wall
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            // Self
            for (let i = 1; i < snake.length; i++) { 
                if (head.x === snake[i].x && head.y === snake[i].y) return true; 
            }
            return false;
        }

        function endGame() { 
            clearInterval(gameLoop); 
            gameOverScreen.style.display = "flex"; 
        }
        
        function resetGame() { 
            initGame(); 
            canvas.focus(); // Keep focus on game after selecting speed
        }

        document.addEventListener("keydown", (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].indexOf(e.code) > -1) e.preventDefault();
            const key = e.key.toLowerCase();
            
            // Prevent 180-degree turns
            if ((key === 'w' || key === 'arrowup') && dy !== 1) { dx = 0; dy = -1; }
            if ((key === 's' || key === 'arrowdown') && dy !== -1) { dx = 0; dy = 1; }
            if ((key === 'a' || key === 'arrowleft') && dx !== 1) { dx = -1; dy = 0; }
            if ((key === 'd' || key === 'arrowright') && dx !== -1) { dx = 1; dy = 0; }
        });

        // Initialize on load
        initGame();
    </script>
</body>
</html>
